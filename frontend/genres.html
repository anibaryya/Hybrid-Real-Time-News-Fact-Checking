<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VeritAI — News genres</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0b; --bg2: #111113; --border: rgba(255,255,255,0.08);
      --text: #f0ede8; --muted: #9b9794; --accent: #e8c97d;
    }
    :root[data-theme='light'] {
      --bg: #f6f7fb; --bg2: #ffffff; --border: rgba(15,23,42,0.12);
      --text: #111827; --muted: #6b7280; --accent: #e8c97d;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 40px 24px 80px;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 8px; }
    h1 span { color: var(--accent); }
    p.sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
    .chips label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg2);
      cursor: pointer;
      font-size: 13px;
    }
    .chips input { accent-color: var(--accent); }
    button.primary {
      padding: 14px 28px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }
    .links { margin-top: 28px; display: flex; gap: 16px; flex-wrap: wrap; }
    a { color: var(--accent); font-size: 14px; }
    .err { color: #f87171; margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;">
      <h1>Verit<span>AI</span> — Your genres</h1>
      <button type="button" id="themeBtn" style="
        padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border);
        background: var(--bg2); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 600;
      ">Light mode</button>
    </div>
    <p class="sub">Pick categories. We’ll show location-first headlines for your selected genres.</p>

    <div class="chips" id="chips"></div>
    <button type="button" class="primary" id="save">Save preferences</button>
    <p class="err" id="err"></p>

    <div class="links">
      <a href="account.html">Profile</a>
      <a href="history.html">History</a>
      <a href="index.html">Home</a>
    </div>

    <div id="preview" style="margin-top:28px;"></div>
  </div>

  <script>
    const API = location.origin;
    (function () {
      const saved = localStorage.getItem('veritai_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('themeBtn');
      const cur = () => localStorage.getItem('veritai_theme') || 'dark';
      const sync = () => { btn.textContent = (cur() === 'light') ? 'Dark mode' : 'Light mode'; };
      sync();
      btn.onclick = () => {
        const next = cur() === 'light' ? 'dark' : 'light';
        localStorage.setItem('veritai_theme', next);
        document.documentElement.setAttribute('data-theme', next);
        sync();
      };
    })();

    // Optional: location for genre-first local headlines.
    let GEO = null;
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => { GEO = { lat: pos.coords.latitude, lon: pos.coords.longitude }; loadPreview(); },
        () => { GEO = null; loadPreview(); },
        { enableHighAccuracy: false, timeout: 8000, maximumAge: 300000 }
      );
    }

    const GENRES = [
      ['technology', 'Technology'],
      ['business', 'Business'],
      ['sports', 'Sports'],
      ['entertainment', 'Entertainment'],
      ['health', 'Health'],
      ['science', 'Science'],
      ['general', 'General'],
    ];

    const chips = document.getElementById('chips');
    GENRES.forEach(([id, label]) => {
      const lab = document.createElement('label');
      lab.innerHTML = '<input type="checkbox" name="g" value="' + id + '" /> ' + label;
      chips.appendChild(lab);
    });

    async function load() {
      const r = await fetch(API + '/api/me', { credentials: 'include' });
      const me = await r.json();
      if (me.user_type !== 'member') {
        document.getElementById('err').textContent =
          'Sign in with email, phone, or Google to save genres. Guests can go back to the detector.';
        document.getElementById('save').disabled = true;
        return;
      }
      const gr = await fetch(API + '/api/user/genres', { credentials: 'include' });
      const gj = await gr.json();
      const set = new Set(gj.genres || []);
      document.querySelectorAll('input[name="g"]').forEach(cb => {
        cb.checked = set.has(cb.value);
      });
      loadPreview();
    }

    document.getElementById('save').onclick = async () => {
      document.getElementById('err').textContent = '';
      const saveBtn = document.getElementById('save');
      const originalText = saveBtn.textContent;
      const originalBg = saveBtn.style.background;
      const originalColor = saveBtn.style.color;
      const selected = [...document.querySelectorAll('input[name="g"]:checked')].map(c => c.value);
      try {
        const r = await fetch(API + '/api/user/genres', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ genres: selected }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Save failed');
        saveBtn.textContent = 'Saved';
        saveBtn.style.background = '#22c55e';
        saveBtn.style.color = '#052e16';
        loadPreview();
        setTimeout(() => {
          saveBtn.textContent = originalText;
          saveBtn.style.background = originalBg;
          saveBtn.style.color = originalColor;
        }, 1000);
      } catch (e) {
        document.getElementById('err').textContent = e.message;
      }
    };

    async function loadPreview() {
      const preview = document.getElementById('preview');
      const me = await fetch(API + '/api/me', { credentials: 'include' }).then(r => r.json()).catch(() => ({}));
      if (me.user_type !== 'member') return;
      const selected = [...new Set(
        [...document.querySelectorAll('input[name="g"]:checked')].map(c => (c.value || '').trim()).filter(Boolean)
      )];
      if (!selected.length) {
        preview.innerHTML = '';
        return;
      }
      const geoQs = GEO ? `&lat=${encodeURIComponent(GEO.lat)}&lon=${encodeURIComponent(GEO.lon)}` : '';
      preview.innerHTML =
        '<div style="font-size:11px; letter-spacing:2px; color:var(--muted); margin-bottom:12px;">PREVIEW</div>';
      let renderedCount = 0;
      for (const g of selected.slice(0, 4)) {
        const r = await fetch(API + `/api/news-by-genre?genre=${encodeURIComponent(g)}${geoQs}`, { credentials: 'include' })
          .then(rr => rr.ok ? rr.json() : ({ articles: [] }))
          .catch(() => ({ articles: [] }));
        const list = Array.isArray(r.articles) ? r.articles.slice(0, 6) : [];
        if (!list.length) continue;
        renderedCount += 1;
        preview.innerHTML += `
          <div style="margin-bottom:18px; border:1px solid var(--border); border-radius:14px; background:var(--bg2); overflow:hidden;">
            <div style="padding:14px 16px; border-bottom:1px solid var(--border); font-weight:700;">
              ${g.toUpperCase()}
            </div>
            <div style="padding:12px 16px; display:flex; flex-direction:column; gap:12px;">
              ${list.map(a => `
                <a href="${a.url || '#'}" target="_blank" rel="noopener noreferrer" style="text-decoration:none; color:inherit;">
                  <div style="display:flex; gap:12px; align-items:flex-start;">
                    ${a.image ? `<img src="${a.image}" alt="" style="width:84px; height:60px; border-radius:10px; object-fit:cover; border:1px solid var(--border);" onerror="this.style.display='none'"/>` : ''}
                    <div style="flex:1; min-width:0;">
                      <div style="font-size:13px; font-weight:600; line-height:1.3;">${(a.title || '').replace(/</g,'&lt;')}</div>
                      <div style="font-size:11px; color:var(--muted); margin-top:6px;">${(a.source || '—').replace(/</g,'&lt;')}</div>
                    </div>
                  </div>
                </a>
              `).join('')}
            </div>
          </div>
        `;
      }
      if (renderedCount === 0) {
        preview.innerHTML += `
          <div style="border:1px solid var(--border); border-radius:14px; background:var(--bg2); padding:14px 16px; color:var(--muted); font-size:13px;">
            No genre news available right now for your selected preferences.
          </div>
        `;
      }
    }

    load().catch(() => {
      document.getElementById('err').textContent = 'Could not reach API. Start Flask and use http://127.0.0.1:5000/genres.html';
    });
  </script>
</body>
</html>
