<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VeritAI — History</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0b; --bg2: #111113; --border: rgba(255,255,255,0.08);
      --text: #f0ede8; --muted: #9b9794; --accent: #e8c97d;
      --real: #4ade80; --fake: #f87171; --unc: #fbbf24;
    }
    :root[data-theme='light'] {
      --bg: #f6f7fb; --bg2: #ffffff; --border: rgba(15,23,42,0.12);
      --text: #111827; --muted: #6b7280; --accent: #e8c97d;
      --real: #16a34a; --fake: #dc2626; --unc: #f59e0b;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 20px 80px; }
    .wrap { max-width: 760px; margin: 0 auto; }
    h1 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 8px; }
    h1 span { color: var(--accent); }
    p.sub { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
    .hist-item {
      padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg2); margin-bottom: 10px;
    }
    .hist-item .v { font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    .hist-item .v.REAL { color: var(--real); }
    .hist-item .v.FAKE { color: var(--fake); }
    .hist-item .v.UNCERTAIN { color: var(--unc); }
    .hist-item .preview { font-size: 13px; margin-top: 8px; color: #c4c0bc; line-height: 1.45; max-height: 4.5em; overflow: hidden; }
    .hist-item .meta { font-size: 11px; color: var(--muted); margin-top: 8px; }
    .links { margin-top: 24px; }
    .links a { color: var(--accent); font-size: 14px; margin-right: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:18px;">
      <a href="index.html" style="text-decoration:none; color:inherit;">
        <h1 style="margin:0;">Verit<span>AI</span></h1>
      </a>
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <a href="index.html" style="color: var(--accent); font-size: 13px; text-decoration:none;">Detector</a>
        <a href="genres.html" style="color: var(--accent); font-size: 13px; text-decoration:none;">Genres</a>
        <a href="account.html" style="color: var(--accent); font-size: 13px; text-decoration:none;">Profile</a>
        <button type="button" id="themeBtn" style="
          padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border);
          background: var(--bg2); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 600;
        ">Light mode</button>
      </div>
    </div>
    <h1 style="margin-top:8px;">Verification <span>History</span></h1>
    <p class="sub">Your latest fact-check results with confidence and certainty.</p>
    <div id="hist-list"></div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="auth.html">Sign in</a>
    </div>
  </div>
  <script>
    const API = location.protocol === 'file:' ? 'http://127.0.0.1:5000' : location.origin;
    (function () {
      const saved = localStorage.getItem('veritai_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('themeBtn');
      const cur = () => localStorage.getItem('veritai_theme') || 'dark';
      const sync = () => { btn.textContent = (cur() === 'light') ? 'Dark mode' : 'Light mode'; };
      sync();
      btn.onclick = () => {
        const next = cur() === 'light' ? 'dark' : 'light';
        localStorage.setItem('veritai_theme', next);
        document.documentElement.setAttribute('data-theme', next);
        sync();
      };
    })();

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    async function loadHistory() {
      const el = document.getElementById('hist-list');
      const me = await fetch(API + '/api/me', { credentials: 'include' }).then(r => r.json());
      if (me.user_type !== 'member') {
        el.innerHTML = '<p style="color:var(--muted)">Sign in to see history.</p>';
        return;
      }
      const r = await fetch(API + '/api/user/history?limit=50', { credentials: 'include' });
      const d = await r.json();
      if (!r.ok) {
        el.innerHTML = '<p style="color:var(--fake)">' + (d.error || 'Failed') + '</p>';
        return;
      }
      if (!d.history || !d.history.length) {
        el.innerHTML = '<p style="color:var(--muted)">No searches yet.</p>';
        return;
      }
      el.innerHTML = d.history.map(h => {
        const dt = h.created_at ? new Date(h.created_at).toLocaleString() : '';
        return '<div class="hist-item"><span class="v ' + h.verdict + '">' + h.verdict + '</span> · ' +
          (h.confidence != null ? h.confidence + '%' : '') + ' · ' + (h.certainty || '') +
          '<div class="preview">' + escapeHtml(h.input_preview || '') + '</div>' +
          '<div class="meta">' + escapeHtml(h.input_mode || '') + ' · ' + dt + '</div></div>';
      }).join('');
    }

    loadHistory();
  </script>
</body>
</html>
